<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#4CAF50">
    <title>Задачник - PWA Приложение</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 Задачник</h1>
            <div class="notification-status">
                <button id="notifyBtn" class="btn-notify">🔔 Включить уведомления</button>
            </div>
        </header>

        <div class="add-task">
            <input type="text" id="taskInput" placeholder="Введите новую задачу..." maxlength="100">
            <input type="datetime-local" id="taskDeadline">
            <button id="addTaskBtn" class="btn-add">➕ Добавить</button>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="active">Активные</button>
            <button class="filter-btn" data-filter="completed">Выполненные</button>
        </div>

        <div class="stats">
            <span>Всего: <span id="totalCount">0</span></span>
            <span>Активных: <span id="activeCount">0</span></span>
            <span>Выполнено: <span id="completedCount">0</span></span>
        </div>

        <ul id="taskList" class="task-list"></ul>
    </div>

    <script src="app.js"></script>
</body>
</html>
